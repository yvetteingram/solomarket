          }
        },
        {
          "@type": "Question",
          "name": "Can I manage client marketing with SoloMarket?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The Agency plan gives you a dedicated agency workspace where you can create separate client workspaces, each with their own campaigns, content, and lead pipeline."
          }
        },
        {
          "@type": "Question",
          "name": "How much does SoloMarket cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SoloMarket offers three plans: Starter at $29/month for one marketing campaign, Growth at $59/month for unlimited campaigns and AI drafts, and Agency at $249/month for managing up to 10 client accounts."
          }
        },
        {
          "@type": "Question",
          "name": "Is SoloMarket good for solopreneurs with no marketing experience?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. SoloMarket is designed specifically for solopreneurs. The Quick Start guide walks you through setting up your first campaign system in under 5 minutes, and all templates are pre-loaded with actionable content — no marketing expertise required."
          }
        }
      ]
    }

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Suppress benign Vite WebSocket errors that confuse users
      const originalError = console.error;
      console.error = (...args) => {
        if (args[0] && typeof args[0] === 'string' && args[0].includes('[vite] failed to connect to websocket')) {
          return;
        }
        originalError.apply(console, args);
      };
      window.addEventListener('unhandledrejection', (event) => {
        if (event.reason && event.reason.message && event.reason.message.includes('WebSocket closed without opened')) {
          event.preventDefault();
        }
      });
    </script>
